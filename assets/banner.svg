<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f9a825"/>
      <stop offset="100%" style="stop-color:#ff6f00"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Brain icon stylized -->
  <g transform="translate(80, 70)">
    <circle cx="80" cy="80" r="65" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>
    <circle cx="80" cy="80" r="45" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
    <circle cx="80" cy="80" r="25" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.8"/>
    <circle cx="80" cy="80" r="8" fill="url(#accent)"/>
    <!-- Neural connections -->
    <line x1="80" y1="15" x2="80" y2="55" stroke="#f9a825" stroke-width="1.5" opacity="0.4"/>
    <line x1="80" y1="105" x2="80" y2="145" stroke="#f9a825" stroke-width="1.5" opacity="0.4"/>
    <line x1="15" y1="80" x2="55" y2="80" stroke="#f9a825" stroke-width="1.5" opacity="0.4"/>
    <line x1="105" y1="80" x2="145" y2="80" stroke="#f9a825" stroke-width="1.5" opacity="0.4"/>
    <line x1="34" y1="34" x2="60" y2="60" stroke="#f9a825" stroke-width="1.5" opacity="0.3"/>
    <line x1="126" y1="34" x2="100" y2="60" stroke="#f9a825" stroke-width="1.5" opacity="0.3"/>
    <line x1="34" y1="126" x2="60" y2="100" stroke="#f9a825" stroke-width="1.5" opacity="0.3"/>
    <line x1="126" y1="126" x2="100" y2="100" stroke="#f9a825" stroke-width="1.5" opacity="0.3"/>
    <!-- Outer dots -->
    <circle cx="80" cy="15" r="4" fill="#f9a825" opacity="0.6"/>
    <circle cx="80" cy="145" r="4" fill="#f9a825" opacity="0.6"/>
    <circle cx="15" cy="80" r="4" fill="#f9a825" opacity="0.6"/>
    <circle cx="145" cy="80" r="4" fill="#f9a825" opacity="0.6"/>
    <circle cx="34" cy="34" r="3" fill="#f9a825" opacity="0.4"/>
    <circle cx="126" cy="34" r="3" fill="#f9a825" opacity="0.4"/>
    <circle cx="34" cy="126" r="3" fill="#f9a825" opacity="0.4"/>
    <circle cx="126" cy="126" r="3" fill="#f9a825" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="300" y="120" font-family="Segoe UI, system-ui, sans-serif" font-size="72" font-weight="700" fill="#ffffff">metacog</text>

  <!-- Subtitle -->
  <text x="300" y="165" font-family="Segoe UI, system-ui, sans-serif" font-size="22" fill="#b0bec5">Metacognition Skill for Claude Code</text>

  <!-- Chinese subtitle -->
  <text x="300" y="200" font-family="Segoe UI, system-ui, sans-serif" font-size="18" fill="#78909c">1 总控 + 8 认知技能 · 认知操作系统</text>

  <!-- Skill tags -->
  <g transform="translate(300, 225)">
    <rect x="0" y="0" width="80" height="26" rx="13" fill="#1565c0" opacity="0.7"/>
    <text x="40" y="17" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">cognition</text>

    <rect x="90" y="0" width="72" height="26" rx="13" fill="#2e7d32" opacity="0.7"/>
    <text x="126" y="17" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">learning</text>

    <rect x="172" y="0" width="72" height="26" rx="13" fill="#6a1b9a" opacity="0.7"/>
    <text x="208" y="17" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">decision</text>

    <rect x="254" y="0" width="74" height="26" rx="13" fill="#00838f" opacity="0.7"/>
    <text x="291" y="17" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">structure</text>

    <rect x="338" y="0" width="74" height="26" rx="13" fill="#d84315" opacity="0.7"/>
    <text x="375" y="17" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">feedback</text>

    <rect x="422" y="0" width="62" height="26" rx="13" fill="#37474f" opacity="0.7"/>
    <text x="453" y="17" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">review</text>

    <rect x="494" y="0" width="70" height="26" rx="13" fill="#ad1457" opacity="0.7"/>
    <text x="529" y="17" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">emotion</text>

    <rect x="574" y="0" width="108" height="26" rx="13" fill="#ef6c00" opacity="0.7"/>
    <text x="628" y="17" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">communication</text>
  </g>
</svg>
