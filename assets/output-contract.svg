<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 120" width="880" height="120">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
  </defs>

  <rect width="880" height="120" fill="url(#bg3)" rx="12"/>

  <!-- Title -->
  <text x="440" y="22" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" fill="#f9a825" text-anchor="middle" letter-spacing="0.1em">OUTPUT CONTRACT | 输出规范</text>

  <!-- 5 cards -->
  <!-- 1. Bilingual Headers -->
  <rect x="20" y="36" width="160" height="72" rx="10" fill="#16213e" stroke="#1f3460" stroke-width="1"/>
  <text x="100" y="60" font-family="Segoe UI,system-ui,sans-serif" font-size="18" fill="#f9a825" text-anchor="middle">&#127760;</text>
  <text x="100" y="78" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" fill="#e0e0e0" text-anchor="middle">Bilingual Headers</text>
  <text x="100" y="94" font-family="Segoe UI,system-ui,sans-serif" font-size="9" fill="#6c7a96" text-anchor="middle">### English | 中文</text>

  <!-- 2. Confidence -->
  <rect x="192" y="36" width="160" height="72" rx="10" fill="#16213e" stroke="#1f3460" stroke-width="1"/>
  <text x="272" y="60" font-family="Segoe UI,system-ui,sans-serif" font-size="18" fill="#f9a825" text-anchor="middle">&#127919;</text>
  <text x="272" y="78" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" fill="#e0e0e0" text-anchor="middle">Confidence 1-10</text>
  <text x="272" y="94" font-family="Segoe UI,system-ui,sans-serif" font-size="9" fill="#6c7a96" text-anchor="middle">Anti Dunning-Kruger</text>

  <!-- 3. Reusable Principle -->
  <rect x="364" y="36" width="160" height="72" rx="10" fill="#16213e" stroke="#1f3460" stroke-width="1"/>
  <text x="444" y="60" font-family="Segoe UI,system-ui,sans-serif" font-size="18" fill="#f9a825" text-anchor="middle">&#128161;</text>
  <text x="444" y="78" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" fill="#e0e0e0" text-anchor="middle">Reusable Principle</text>
  <text x="444" y="94" font-family="Segoe UI,system-ui,sans-serif" font-size="9" fill="#6c7a96" text-anchor="middle">可复用原则 · Transferable</text>

  <!-- 4. Language-adaptive -->
  <rect x="536" y="36" width="160" height="72" rx="10" fill="#16213e" stroke="#1f3460" stroke-width="1"/>
  <text x="616" y="60" font-family="Segoe UI,system-ui,sans-serif" font-size="18" fill="#f9a825" text-anchor="middle">&#127463;</text>
  <text x="616" y="78" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" fill="#e0e0e0" text-anchor="middle">Language-adaptive</text>
  <text x="616" y="94" font-family="Segoe UI,system-ui,sans-serif" font-size="9" fill="#6c7a96" text-anchor="middle">中文问→中文答</text>

  <!-- 5. Anti-flattery -->
  <rect x="708" y="36" width="152" height="72" rx="10" fill="#16213e" stroke="#1f3460" stroke-width="1"/>
  <text x="784" y="60" font-family="Segoe UI,system-ui,sans-serif" font-size="18" fill="#f9a825" text-anchor="middle">&#128683;</text>
  <text x="784" y="78" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" fill="#e0e0e0" text-anchor="middle">Anti-flattery</text>
  <text x="784" y="94" font-family="Segoe UI,system-ui,sans-serif" font-size="9" fill="#6c7a96" text-anchor="middle">反媚 · Substance only</text>
</svg>
