<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
  </defs>

  <rect width="880" height="440" fill="url(#bg2)" rx="16"/>

  <!-- Title -->
  <text x="440" y="32" font-family="Segoe UI,system-ui,sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">Theoretical Foundations → Skills | 理论基础 → 技能映射</text>

  <!-- Theory clusters (left side) -->
  <!-- 1. Cognition theories -->
  <rect x="30" y="58" width="260" height="50" rx="10" fill="#0d1b36" stroke="#1565c0" stroke-width="1.5"/>
  <text x="160" y="78" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" fill="#90caf9" text-anchor="middle">Flavell · Nelson &amp; Narens · Dunning-Kruger</text>
  <text x="160" y="96" font-family="Segoe UI,system-ui,sans-serif" font-size="9" fill="#5c6b8a" text-anchor="middle">元认知理论 · 监控-控制 · 认知偏差</text>

  <!-- 2. Learning theories -->
  <rect x="30" y="120" width="260" height="50" rx="10" fill="#0d1b36" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="160" y="140" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" fill="#a5d6a7" text-anchor="middle">Feynman · Ericsson · Pareto 80/20</text>
  <text x="160" y="158" font-family="Segoe UI,system-ui,sans-serif" font-size="9" fill="#5c6b8a" text-anchor="middle">费曼技巧 · 刻意练习 · 帕累托法则</text>

  <!-- 3. Decision theories -->
  <rect x="30" y="182" width="260" height="50" rx="10" fill="#0d1b36" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="160" y="202" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" fill="#ce93d8" text-anchor="middle">Kahneman · Prospect Theory · Klein</text>
  <text x="160" y="220" font-family="Segoe UI,system-ui,sans-serif" font-size="9" fill="#5c6b8a" text-anchor="middle">双系统理论 · 前景理论 · 预验尸</text>

  <!-- 4. Emotion theories -->
  <rect x="30" y="244" width="260" height="50" rx="10" fill="#0d1b36" stroke="#ad1457" stroke-width="1.5"/>
  <text x="160" y="264" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" fill="#f48fb1" text-anchor="middle">Gottman · Gross · Slovic</text>
  <text x="160" y="282" font-family="Segoe UI,system-ui,sans-serif" font-size="9" fill="#5c6b8a" text-anchor="middle">元情绪哲学 · 认知重评 · 情感启发式</text>

  <!-- 5. Communication theories -->
  <rect x="30" y="306" width="260" height="50" rx="10" fill="#0d1b36" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="160" y="326" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" fill="#ffcc80" text-anchor="middle">Bateson · Watzlawick · Schulz von Thun · NVC</text>
  <text x="160" y="344" font-family="Segoe UI,system-ui,sans-serif" font-size="9" fill="#5c6b8a" text-anchor="middle">元沟通 · 沟通公理 · 四耳模型 · 非暴力沟通</text>

  <!-- 6. Review/Meta theories -->
  <rect x="30" y="368" width="260" height="50" rx="10" fill="#0d1b36" stroke="#546e7a" stroke-width="1.5"/>
  <text x="160" y="388" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600" fill="#b0bec5" text-anchor="middle">Argyris · Minto · Reflexion (Shinn 2023)</text>
  <text x="160" y="406" font-family="Segoe UI,system-ui,sans-serif" font-size="9" fill="#5c6b8a" text-anchor="middle">双环学习 · 金字塔原理 · LLM自省</text>

  <!-- Arrows -->
  <line x1="290" y1="83" x2="580" y2="83" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="576,78 588,83 576,88" fill="#1565c0"/>

  <line x1="290" y1="145" x2="580" y2="145" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="576,140 588,145 576,150" fill="#2e7d32"/>

  <line x1="290" y1="207" x2="580" y2="207" stroke="#6a1b9a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="576,202 588,207 576,212" fill="#6a1b9a"/>

  <line x1="290" y1="269" x2="580" y2="269" stroke="#ad1457" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="576,264 588,269 576,274" fill="#ad1457"/>

  <line x1="290" y1="331" x2="580" y2="331" stroke="#ef6c00" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="576,326 588,331 576,336" fill="#ef6c00"/>

  <line x1="290" y1="393" x2="580" y2="393" stroke="#546e7a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="576,388 588,393 576,398" fill="#546e7a"/>

  <!-- Cross-links (structure and feedback share theories) -->
  <line x1="290" y1="393" x2="580" y2="269" stroke="#00838f" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="290" y1="83" x2="580" y2="331" stroke="#d84315" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Skill targets (right side) -->
  <rect x="590" y="62" width="260" height="42" rx="10" fill="#0d1b36" stroke="#1565c0" stroke-width="2"/>
  <rect x="590" y="62" width="5" height="42" rx="2" fill="#1565c0"/>
  <text x="605" y="82" font-family="Segoe UI,system-ui,sans-serif" font-size="13" font-weight="700" fill="#90caf9" dx="10">cognition</text>
  <text x="605" y="97" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#5c6b8a" dx="10">元认知 · Monitor → Evaluate → Regulate</text>

  <rect x="590" y="124" width="260" height="42" rx="10" fill="#0d1b36" stroke="#2e7d32" stroke-width="2"/>
  <rect x="590" y="124" width="5" height="42" rx="2" fill="#2e7d32"/>
  <text x="605" y="144" font-family="Segoe UI,system-ui,sans-serif" font-size="13" font-weight="700" fill="#a5d6a7" dx="10">learning</text>
  <text x="605" y="159" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#5c6b8a" dx="10">元学习 · Map → Path → Transfer</text>

  <rect x="590" y="186" width="260" height="42" rx="10" fill="#0d1b36" stroke="#6a1b9a" stroke-width="2"/>
  <rect x="590" y="186" width="5" height="42" rx="2" fill="#6a1b9a"/>
  <text x="605" y="206" font-family="Segoe UI,system-ui,sans-serif" font-size="13" font-weight="700" fill="#ce93d8" dx="10">decision</text>
  <text x="605" y="221" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#5c6b8a" dx="10">元决策 · Frame → Analyze → Decide</text>

  <rect x="590" y="248" width="260" height="42" rx="10" fill="#0d1b36" stroke="#ad1457" stroke-width="2"/>
  <rect x="590" y="248" width="5" height="42" rx="2" fill="#ad1457"/>
  <text x="605" y="268" font-family="Segoe UI,system-ui,sans-serif" font-size="13" font-weight="700" fill="#f48fb1" dx="10">emotion</text>
  <text x="605" y="283" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#5c6b8a" dx="10">元情绪 · Identify → Analyze → Reappraise</text>

  <rect x="590" y="310" width="260" height="42" rx="10" fill="#0d1b36" stroke="#ef6c00" stroke-width="2"/>
  <rect x="590" y="310" width="5" height="42" rx="2" fill="#ef6c00"/>
  <text x="605" y="330" font-family="Segoe UI,system-ui,sans-serif" font-size="13" font-weight="700" fill="#ffcc80" dx="10">communication</text>
  <text x="605" y="345" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#5c6b8a" dx="10">元沟通 · Decode → Diagnose → Redesign</text>

  <rect x="590" y="372" width="260" height="42" rx="10" fill="#0d1b36" stroke="#546e7a" stroke-width="2"/>
  <rect x="590" y="372" width="5" height="42" rx="2" fill="#546e7a"/>
  <text x="605" y="392" font-family="Segoe UI,system-ui,sans-serif" font-size="13" font-weight="700" fill="#b0bec5" dx="10">review + structure + feedback</text>
  <text x="605" y="407" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#5c6b8a" dx="10">元复盘 · 元结构 · 元反馈</text>

  <!-- Column labels -->
  <text x="160" y="52" font-family="Segoe UI,system-ui,sans-serif" font-size="10" font-weight="600" fill="#f9a825" text-anchor="middle">THEORY | 理论</text>
  <text x="720" y="52" font-family="Segoe UI,system-ui,sans-serif" font-size="10" font-weight="600" fill="#f9a825" text-anchor="middle">SKILL | 技能</text>
</svg>
