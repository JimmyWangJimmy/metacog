  <rect x="660" y="220" width="180" height="110" rx="12" fill="#0d1b36" stroke="#00838f" stroke-width="2"/>
  <rect x="660" y="220" width="180" height="4" rx="2" fill="#00838f"/>
  <circle cx="685" cy="252" r="14" fill="#00838f20" stroke="#00838f" stroke-width="1.5"/>
  <text x="685" y="257" font-family="Segoe UI,system-ui,sans-serif" font-size="13" fill="#80deea" text-anchor="middle">&#127959;</text>
  <text x="708" y="250" font-family="Segoe UI,system-ui,sans-serif" font-size="14" font-weight="700" fill="#80deea">structure</text>
  <text x="708" y="268" font-family="Segoe UI,system-ui,sans-serif" font-size="11" fill="#5c6b8a">元结构</text>
  <text x="750" y="295" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#4a5a7a" text-anchor="middle">MECE logical skeleton</text>
  <text x="750" y="310" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#3a4a6a" text-anchor="middle">Extract → Architect → Validate</text>

  <!-- Row 2: Skills 5-8 -->
  <!-- feedback -->
  <rect x="60" y="370" width="180" height="110" rx="12" fill="#0d1b36" stroke="#d84315" stroke-width="2"/>
  <rect x="60" y="370" width="180" height="4" rx="2" fill="#d84315"/>
  <circle cx="85" cy="402" r="14" fill="#d8431520" stroke="#d84315" stroke-width="1.5"/>
  <text x="85" y="407" font-family="Segoe UI,system-ui,sans-serif" font-size="13" fill="#ffab91" text-anchor="middle">&#127919;</text>
  <text x="108" y="400" font-family="Segoe UI,system-ui,sans-serif" font-size="14" font-weight="700" fill="#ffab91">feedback</text>
  <text x="108" y="418" font-family="Segoe UI,system-ui,sans-serif" font-size="11" fill="#5c6b8a">元反馈</text>
  <text x="150" y="445" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#4a5a7a" text-anchor="middle">Causal-chain analysis</text>
  <text x="150" y="460" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#3a4a6a" text-anchor="middle">Assess → Diagnose → Prescribe</text>

  <!-- review -->
  <rect x="260" y="370" width="180" height="110" rx="12" fill="#0d1b36" stroke="#546e7a" stroke-width="2"/>
  <rect x="260" y="370" width="180" height="4" rx="2" fill="#546e7a"/>
  <circle cx="285" cy="402" r="14" fill="#546e7a20" stroke="#546e7a" stroke-width="1.5"/>
  <text x="285" y="407" font-family="Segoe UI,system-ui,sans-serif" font-size="13" fill="#b0bec5" text-anchor="middle">&#128260;</text>
  <text x="308" y="400" font-family="Segoe UI,system-ui,sans-serif" font-size="14" font-weight="700" fill="#b0bec5">review</text>
  <text x="308" y="418" font-family="Segoe UI,system-ui,sans-serif" font-size="11" fill="#5c6b8a">元复盘</text>
  <text x="350" y="445" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#4a5a7a" text-anchor="middle">5 Whys &amp; SOP extraction</text>
  <text x="350" y="460" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#3a4a6a" text-anchor="middle">Reconstruct → Diagnose → Extract</text>

  <!-- emotion -->
  <rect x="460" y="370" width="180" height="110" rx="12" fill="#0d1b36" stroke="#ad1457" stroke-width="2"/>
  <rect x="460" y="370" width="180" height="4" rx="2" fill="#ad1457"/>
  <circle cx="485" cy="402" r="14" fill="#ad145720" stroke="#ad1457" stroke-width="1.5"/>
  <text x="485" y="407" font-family="Segoe UI,system-ui,sans-serif" font-size="13" fill="#f48fb1" text-anchor="middle">&#128161;</text>
  <text x="508" y="400" font-family="Segoe UI,system-ui,sans-serif" font-size="14" font-weight="700" fill="#f48fb1">emotion</text>
  <text x="508" y="418" font-family="Segoe UI,system-ui,sans-serif" font-size="11" fill="#5c6b8a">元情绪</text>
  <text x="550" y="445" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#4a5a7a" text-anchor="middle">Emotion-reasoning awareness</text>
  <text x="550" y="460" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#3a4a6a" text-anchor="middle">Identify → Analyze → Reappraise</text>

  <!-- communication -->
  <rect x="660" y="370" width="180" height="110" rx="12" fill="#0d1b36" stroke="#ef6c00" stroke-width="2"/>
  <rect x="660" y="370" width="180" height="4" rx="2" fill="#ef6c00"/>
  <circle cx="685" cy="402" r="14" fill="#ef6c0020" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="685" y="407" font-family="Segoe UI,system-ui,sans-serif" font-size="13" fill="#ffcc80" text-anchor="middle">&#128483;</text>
  <text x="708" y="400" font-family="Segoe UI,system-ui,sans-serif" font-size="14" font-weight="700" fill="#ffcc80">communication</text>
  <text x="708" y="418" font-family="Segoe UI,system-ui,sans-serif" font-size="11" fill="#5c6b8a">元沟通</text>
  <text x="750" y="445" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#4a5a7a" text-anchor="middle">Meta-message decoding</text>
  <text x="750" y="460" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#3a4a6a" text-anchor="middle">Decode → Diagnose → Redesign</text>

  <!-- Bottom label -->
  <text x="440" y="508" font-family="Segoe UI,system-ui,sans-serif" font-size="11" fill="#3a4a6a" text-anchor="middle">All skills output: Bilingual headers · Confidence 1-10 · Reusable principle · Anti-flattery</text>
</svg>
