<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f9a825"/>
      <stop offset="100%" style="stop-color:#ff6f00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="url(#bg)" rx="16"/>

  <!-- User Input -->
  <rect x="290" y="28" width="300" height="42" rx="21" fill="none" stroke="#4a5a7a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="440" y="55" font-family="Segoe UI,system-ui,sans-serif" font-size="14" fill="#8899b4" text-anchor="middle">/metacog  your question here</text>

  <!-- Arrow down -->
  <line x1="440" y1="72" x2="440" y2="100" stroke="#f9a825" stroke-width="2"/>
  <polygon points="433,96 440,108 447,96" fill="#f9a825"/>

  <!-- Router -->
  <rect x="250" y="110" width="380" height="56" rx="28" fill="url(#amber)" filter="url(#glow)"/>
  <text x="440" y="136" font-family="Segoe UI,system-ui,sans-serif" font-size="16" font-weight="700" fill="#000" text-anchor="middle">Router | Auto-detect intent or parse keyword</text>
  <text x="440" y="155" font-family="Segoe UI,system-ui,sans-serif" font-size="11" fill="#5d4037" text-anchor="middle">路由器 · 自动识别意图或解析关键词</text>

  <!-- Fan-out arrows -->
  <g stroke="#f9a82580" stroke-width="1.5">
    <line x1="310" y1="166" x2="150" y2="220"/>
    <line x1="370" y1="166" x2="320" y2="220"/>
    <line x1="430" y1="166" x2="480" y2="220"/>
    <line x1="490" y1="166" x2="640" y2="220"/>
    <line x1="310" y1="166" x2="150" y2="370"/>
    <line x1="370" y1="166" x2="320" y2="370"/>
    <line x1="430" y1="166" x2="480" y2="370"/>
    <line x1="490" y1="166" x2="640" y2="370"/>
  </g>

  <!-- Row 1: Skills 1-4 -->
  <!-- cognition -->
  <rect x="60" y="220" width="180" height="110" rx="12" fill="#0d1b36" stroke="#1565c0" stroke-width="2"/>
  <rect x="60" y="220" width="180" height="4" rx="2" fill="#1565c0"/>
  <circle cx="85" cy="252" r="14" fill="#1565c020" stroke="#1565c0" stroke-width="1.5"/>
  <text x="85" y="257" font-family="Segoe UI,system-ui,sans-serif" font-size="13" fill="#90caf9" text-anchor="middle">&#128269;</text>
  <text x="108" y="250" font-family="Segoe UI,system-ui,sans-serif" font-size="14" font-weight="700" fill="#90caf9">cognition</text>
  <text x="108" y="268" font-family="Segoe UI,system-ui,sans-serif" font-size="11" fill="#5c6b8a">元认知</text>
  <text x="150" y="295" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#4a5a7a" text-anchor="middle">Bias &amp; logic analysis</text>
  <text x="150" y="310" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#3a4a6a" text-anchor="middle">Monitor → Evaluate → Regulate</text>

  <!-- learning -->
  <rect x="260" y="220" width="180" height="110" rx="12" fill="#0d1b36" stroke="#2e7d32" stroke-width="2"/>
  <rect x="260" y="220" width="180" height="4" rx="2" fill="#2e7d32"/>
  <circle cx="285" cy="252" r="14" fill="#2e7d3220" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="285" y="257" font-family="Segoe UI,system-ui,sans-serif" font-size="13" fill="#a5d6a7" text-anchor="middle">&#128218;</text>
