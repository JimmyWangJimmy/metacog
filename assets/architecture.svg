  <rect x="460" y="220" width="180" height="110" rx="12" fill="#0d1b36" stroke="#6a1b9a" stroke-width="2"/>
  <rect x="460" y="220" width="180" height="4" rx="2" fill="#6a1b9a"/>
  <circle cx="485" cy="252" r="14" fill="#6a1b9a20" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="485" y="257" font-family="Segoe UI,system-ui,sans-serif" font-size="13" fill="#ce93d8" text-anchor="middle">&#9878;</text>
