  <text x="308" y="268" font-family="Segoe UI,system-ui,sans-serif" font-size="11" fill="#5c6b8a">元学习</text>
  <text x="350" y="295" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#4a5a7a" text-anchor="middle">Learning path design</text>
  <text x="350" y="310" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#3a4a6a" text-anchor="middle">Map → Path → Transfer</text>

