  <text x="508" y="268" font-family="Segoe UI,system-ui,sans-serif" font-size="11" fill="#5c6b8a">元决策</text>
  <text x="550" y="295" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#4a5a7a" text-anchor="middle">Trade-off &amp; pre-mortem</text>
  <text x="550" y="310" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#3a4a6a" text-anchor="middle">Frame → Analyze → Decide</text>

